<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>垃圾分类小能手 - 科技节AI挑战赛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* 背景占满全屏 */
        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #c7e9d0 0%, #b8dfc4 100%);
            overflow: hidden;  /* 禁止页面滚动 */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', 'Fredoka One', 'Quicksand', system-ui, sans-serif;
        }

        /* 使用缩放容器：根据屏幕高度自动缩放，保证一屏完整显示 */
        .game-scale-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 使用视口单位，基于高度缩放，最大宽度为1200px */
            transform: scale(var(--scale-ratio));
        }

        /* 游戏基准尺寸（设计稿宽度1100px，高度约900px，适合平板横屏） */
        .game-container {
            width: 1100px;
            background: #fffef7;
            border-radius: 60px 60px 50px 50px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        /* 标题 */
        .game-title {
            background: #f5b342;
            text-align: center;
            padding: 20px 20px 16px;
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #fff2b5;
            text-shadow: 4px 4px 0 #c46f1a;
            font-family: 'Fredoka One', 'Comic Neue', cursive;
            border-bottom: 5px solid #ffdb9f;
        }

        /* 头部区域 */
        .game-header {
            background: #ffecb3;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 4px solid #ffcf7a;
        }

        .score-board {
            background: #2f6b47;
            padding: 8px 25px;
            border-radius: 60px;
            color: #fff0bf;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: inset 0 -2px 0 #1f4a30;
        }
        .score-board span { 
            font-size: 2rem; 
            color: #ffe082; 
            margin-right: 8px;
        }

        .question-counter {
            background: #fff6e0;
            padding: 8px 22px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.3rem;
            color: #c2801a;
            box-shadow: inset 0 0 0 2px white;
        }

        /* 主游戏区 */
        .game-main {
            padding: 25px 30px 30px;
            text-align: center;
        }

        /* 图片卡片 */
        .image-card {
            background: white;
            border-radius: 70px;
            padding: 20px 20px;
            margin-bottom: 20px;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #ffe3bc;
        }

        /* 垃圾图片 */
        .garbage-img {
            width: 260px;
            height: 260px;
            object-fit: contain;
            background: #fef7e8;
            border-radius: 60px;
            padding: 15px;
            filter: drop-shadow(8px 12px 14px rgba(0,0,0,0.12));
        }

        /* 垃圾名称 */
        .question-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 12px;
            color: #4a3a28;
            background: #fff0dd;
            display: inline-block;
            padding: 6px 28px;
            border-radius: 60px;
        }

        /* 反馈区域 */
        .feedback {
            margin: 15px 0 12px;
            font-size: 1.1rem;
            font-weight: 600;
            min-height: 65px;
            padding: 10px 18px;
            background: #eff7ea;
            border-radius: 60px;
            color: #357a47;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* 分类按钮区域 */
        .categories {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 20px 0 15px;
        }

        .cat-btn {
            flex: 1 1 150px;
            background: white;
            border: none;
            padding: 12px 8px;
            border-radius: 100px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 5px 0 #bfb28b;
            font-family: inherit;
        }
        .cat-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #bfb28b; }

        .cat-recyclable { background: #d4efff; color: #0077a3; border-bottom: 3px solid #4aa3d4; }
        .cat-kitchen { background: #e0f5cf; color: #417d2c; border-bottom: 3px solid #7fc45a; }
        .cat-harmful { background: #ffe2e2; color: #c24b4b; border-bottom: 3px solid #ed7a7a; }
        .cat-other { background: #f7ecdb; color: #a57c4c; border-bottom: 3px solid #dba768; }

        /* 重置按钮 */
        .reset-btn {
            background: #f3bc6d;
            border: none;
            margin-top: 12px;
            margin-bottom: 8px;
            padding: 10px 35px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            color: #3b2f1e;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }
        .reset-btn:hover { background: #ffcf86; }

        /* 底部 */
        .footer {
            padding: 10px 20px 18px;
            text-align: center;
            font-size: 0.8rem;
            color: #9b7e5a;
            background: #fffef7;
        }

        .disabled-btn {
            pointer-events: none;
            opacity: 0.65;
            filter: grayscale(0.1);
            transform: none !important;
        }

        /* 弹窗样式 */
        .modal-win {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-win.active {
            visibility: visible;
            opacity: 1;
        }
        .win-card {
            max-width: 500px;
            background: #fffef2;
            border-radius: 70px;
            padding: 35px 40px 45px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            animation: bouncePop 0.4s ease-out;
        }
        @keyframes bouncePop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .win-card h2 { font-size: 2.5rem; color: #f5a623; margin-bottom: 15px; }
        .win-card p { font-size: 1.1rem; margin: 12px 0; }
        .win-card button {
            background: #56ab56;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="game-scale-wrapper" id="scaleWrapper">
    <div class="game-container">
        <div class="game-title">🗑️ 垃圾分类小能手 ♻️</div>
        <div class="game-header">
            <div class="score-board">🏆 积分 <span id="scoreValue">0</span> / 5</div>
            <div class="question-counter">📋 第 <span id="currentQNumber">1</span> / 5 关</div>
        </div>
        <div class="game-main">
            <div class="image-card">
                <img id="garbageImage" class="garbage-img" src="" alt="生活垃圾">
                <div class="question-name" id="itemNameDisplay">加载中...</div>
            </div>
            <div class="feedback" id="feedbackMsg">
                🤖 AI 视觉识别已启动！点击下方分类桶，答对5种不同垃圾即可通关 🌟
            </div>
            <div class="categories" id="categoriesGroup">
                <button class="cat-btn cat-recyclable" data-type="recyclable">♻️ 可回收物</button>
                <button class="cat-btn cat-kitchen" data-type="kitchen">🍂 厨余垃圾</button>
                <button class="cat-btn cat-harmful" data-type="harmful">⚠️ 有害垃圾</button>
                <button class="cat-btn cat-other" data-type="other">🗑️ 其他垃圾</button>
            </div>
            <button id="resetGameBtn" class="reset-btn">🔄 重新挑战</button>
        </div>
        <div class="footer">
            🌍 环保小先锋
        </div>
    </div>
</div>
<div id="winModal" class="modal-win">
    <div class="win-card">
        <h2>🎉 通关成功 🎉</h2>
        <p>🏅 科技节「垃圾分类小能手」勋章 🏅<br>⭐ 环保知识满分，赢得盖章 ⭐</p>
        <p>✔️ 正确分类5种垃圾，为地球减负！</p>
        <button id="closeWinBtn">✨ 再玩一次 ✨</button>
    </div>
</div>

<script>
    // ---------- 屏幕自适应缩放 ----------
    function updateScale() {
        const wrapper = document.getElementById('scaleWrapper');
        const container = document.querySelector('.game-container');
        if (!wrapper || !container) return;
        
        // 获取屏幕宽高
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        
        // 游戏基准尺寸（设计宽度1100px，高度约850px）
        const baseWidth = 1100;
        const baseHeight = 850;
        
        // 计算宽高缩放比例，取较小值确保完全显示
        const scaleX = screenWidth / baseWidth;
        const scaleY = screenHeight / baseHeight;
        const scale = Math.min(scaleX, scaleY, 1.2); // 最大放大不超过1.2倍
        
        // 应用缩放
        wrapper.style.setProperty('--scale-ratio', scale);
        wrapper.style.transform = `scale(${scale})`;
    }
    
    // 监听窗口变化
    window.addEventListener('resize', updateScale);
    window.addEventListener('load', updateScale);
    
    // ---------- 丰富题库 (每种分类至少三种垃圾，共12个不同物品) ----------
    const FULL_LIBRARY = [
        { id: 1, name: "塑料瓶", displayName: "🥤 塑料瓶", category: "recyclable", emoji: "🧴", fact: "塑料瓶回收后可制成新瓶子或衣服纤维" },
        { id: 2, name: "玻璃瓶", displayName: "🍾 玻璃瓶", category: "recyclable", emoji: "🥃", fact: "玻璃瓶可以无限循环再造" },
        { id: 3, name: "易拉罐", displayName: "🥫 易拉罐", category: "recyclable", emoji: "🥫", fact: "铝制易拉罐回收节能95%" },
        { id: 4, name: "苹果核", displayName: "🍎 苹果核", category: "kitchen", emoji: "🍎", fact: "厨余垃圾可做成有机肥料" },
        { id: 5, name: "香蕉皮", displayName: "🍌 香蕉皮", category: "kitchen", emoji: "🍌", fact: "香蕉皮是很好的堆肥材料" },
        { id: 6, name: "剩菜剩饭", displayName: "🍚 剩菜剩饭", category: "kitchen", emoji: "🍲", fact: "厨余垃圾通过厌氧发酵能产生沼气" },
        { id: 7, name: "废旧电池", displayName: "🔋 废旧电池", category: "harmful", emoji: "🔋", fact: "一粒纽扣电池可污染60万升水" },
        { id: 8, name: "过期药品", displayName: "💊 过期药品", category: "harmful", emoji: "💊", fact: "过期药品不可随意丢弃，需特殊处理" },
        { id: 9, name: "废荧光灯管", displayName: "💡 废灯管", category: "harmful", emoji: "💡", fact: "灯管含汞，对环境和健康有害" },
        { id: 10, name: "纸巾", displayName: "🧻 纸巾", category: "other", emoji: "🧻", fact: "用过的纸巾不可回收，属于其他垃圾" },
        { id: 11, name: "一次性餐具", displayName: "🥢 一次性餐具", category: "other", emoji: "🥢", fact: "受污染的一次性餐具不可回收" },
        { id: 12, name: "脏污塑料袋", displayName: "🛍️ 脏塑料袋", category: "other", emoji: "🛍️", fact: "受污染塑料袋属于其他垃圾" }
    ];

    let currentRoundQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let gameActive = true;
    let waitingForNext = false;

    const scoreSpan = document.getElementById('scoreValue');
    const currentQNumberSpan = document.getElementById('currentQNumber');
    const garbageImage = document.getElementById('garbageImage');
    const itemNameDisplay = document.getElementById('itemNameDisplay');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const categoryBtns = document.querySelectorAll('.cat-btn');
    const resetBtn = document.getElementById('resetGameBtn');
    const winModal = document.getElementById('winModal');
    const closeWinBtn = document.getElementById('closeWinBtn');

    function getRandomQuestions(count) {
        if (count > FULL_LIBRARY.length) count = FULL_LIBRARY.length;
        const shuffled = [...FULL_LIBRARY];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    function generateSvgForItem(item) {
        const bgColors = {
            recyclable: "#E8F5FB",
            kitchen: "#EEF9E6",
            harmful: "#FFEFEF",
            other: "#FEF6E8"
        };
        const bgColor = bgColors[item.category] || "#FFF7EA";
        const svgString = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
                <rect width="300" height="300" rx="70" fill="${bgColor}" stroke="#FFD89F" stroke-width="4"/>
                <circle cx="150" cy="140" r="70" fill="white" opacity="0.75"/>
                <text x="150" y="185" font-size="120" text-anchor="middle" dominant-baseline="middle" fill="#553D1E">${item.emoji}</text>
            </svg>
        `;
        return 'data:image/svg+xml,' + encodeURIComponent(svgString);
    }

    function updateScoreUI() { scoreSpan.innerText = score; }
    function updateQuestionNumberUI() { currentQNumberSpan.innerText = currentIndex + 1; }

    function winGame() {
        if (!gameActive) return;
        gameActive = false;
        enableButtons(false);
        winModal.classList.add('active');
    }

    function enableButtons(enable) {
        categoryBtns.forEach(btn => {
            if (enable) {
                btn.classList.remove('disabled-btn');
                btn.disabled = false;
            } else {
                btn.classList.add('disabled-btn');
                btn.disabled = true;
            }
        });
    }

    function loadCurrentQuestion() {
        if (!gameActive) return;
        if (currentIndex >= currentRoundQuestions.length) {
            if (score >= 5) winGame();
            return;
        }
        const q = currentRoundQuestions[currentIndex];
        itemNameDisplay.innerText = q.displayName;
        garbageImage.src = generateSvgForItem(q);
        updateQuestionNumberUI();
    }

    function getCategoryChinese(type) {
        const map = {
            recyclable: "可回收物 ♻️",
            kitchen: "厨余垃圾 🍂",
            harmful: "有害垃圾 ⚠️",
            other: "其他垃圾 🗑️"
        };
        return map[type] || "其他垃圾";
    }

    async function handleAnswer(selectedType) {
        if (!gameActive || waitingForNext) return;
        if (score >= 5) { winGame(); return; }
        if (currentIndex >= currentRoundQuestions.length) return;

        const currentItem = currentRoundQuestions[currentIndex];
        const isCorrect = (selectedType === currentItem.category);

        feedbackDiv.innerHTML = "🤖 AI 图像识别中... 🔍 分析垃圾特征";
        feedbackDiv.style.backgroundColor = "#f5e9d3";
        await new Promise(resolve => setTimeout(resolve, 200));

        if (isCorrect) {
            score++;
            updateScoreUI();
            const knowledge = currentItem.fact || "分类正确，保护环境！";
            feedbackDiv.innerHTML = `✅ 正确！ “${currentItem.displayName}” 属于 ${getCategoryChinese(currentItem.category)}。 ${knowledge} 🌟 +1分`;
            feedbackDiv.style.backgroundColor = "#d9f0cd";
            feedbackDiv.style.color = "#2a6b2f";

            if (score >= 5) {
                waitingForNext = true;
                enableButtons(false);
                setTimeout(() => { if (gameActive) winGame(); }, 1850);
                return;
            }

            waitingForNext = true;
            enableButtons(false);
            setTimeout(() => {
                currentIndex++;
                if (currentIndex < currentRoundQuestions.length && score < 5) {
                    loadCurrentQuestion();
                    waitingForNext = false;
                    enableButtons(true);
                    feedbackDiv.innerHTML = "🎯 下一件垃圾来啦！AI继续帮你识别，快分类吧！";
                    feedbackDiv.style.backgroundColor = "#eff7ea";
                    feedbackDiv.style.color = "#357a47";
                } else if (score >= 5) {
                    winGame();
                } else {
                    waitingForNext = false;
                    enableButtons(true);
                    feedbackDiv.innerHTML = "🎉 继续挑战吧！分类大师";
                }
            }, 1850);
        } else {
            const correctCatName = getCategoryChinese(currentItem.category);
            feedbackDiv.innerHTML = `❌ 分类错误！ “${currentItem.displayName}” 不属于 ${getCategoryChinese(selectedType)}。 它属于 ${correctCatName}。 📚 再试试，答对即可前进！`;
            feedbackDiv.style.backgroundColor = "#ffe8e8";
            feedbackDiv.style.color = "#bc5a3c";
            waitingForNext = true;
            enableButtons(false);
            setTimeout(() => {
                waitingForNext = false;
                enableButtons(true);
                feedbackDiv.innerHTML = "💪 别灰心！仔细观察垃圾种类，选对分类就能得分通关！";
                feedbackDiv.style.backgroundColor = "#eff7ea";
                feedbackDiv.style.color = "#357a47";
            }, 2300);
        }
    }

    function initGame() {
        currentRoundQuestions = getRandomQuestions(5);
        for (let i = currentRoundQuestions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentRoundQuestions[i], currentRoundQuestions[j]] = [currentRoundQuestions[j], currentRoundQuestions[i]];
        }
        currentIndex = 0;
        score = 0;
        gameActive = true;
        waitingForNext = false;
        updateScoreUI();
        updateQuestionNumberUI();
        enableButtons(true);
        loadCurrentQuestion();
        winModal.classList.remove('active');
        feedbackDiv.innerHTML = "🤖 AI 视觉识别已开启！答对5种不同物品即可通关~ 🌈";
        feedbackDiv.style.backgroundColor = "#eff7ea";
        feedbackDiv.style.color = "#357a47";
    }

    function bindEvents() {
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const catType = btn.getAttribute('data-type');
                handleAnswer(catType);
            });
        });
        resetBtn.addEventListener('click', () => { initGame(); });
        closeWinBtn.addEventListener('click', () => { winModal.classList.remove('active'); initGame(); });
    }

    bindEvents();
    initGame();
</script>
</body>
</html>
