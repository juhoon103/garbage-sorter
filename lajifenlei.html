<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>垃圾分类小能手 - 科技节AI挑战赛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* 明亮清新的背景 */
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #c7e9d0 0%, #b8dfc4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', 'Fredoka One', 'Quicksand', system-ui, sans-serif;
            padding: 30px;
        }

        /* 针对平板大屏幕优化容器宽度 */
        .game-container {
            max-width: 1400px;
            width: 100%;
            background: #fffef7;
            border-radius: 80px 80px 70px 70px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.15), inset 0 1px 3px rgba(255,255,240,0.8);
            overflow: hidden;
            transition: transform 0.2s;
        }

        /* 卡通风格标题 - 加大 */
        .game-title {
            background: #f5b342;
            text-align: center;
            padding: 24px 20px 18px;
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #fff2b5;
            text-shadow: 5px 5px 0 #c46f1a;
            font-family: 'Fredoka One', 'Comic Neue', cursive;
            border-bottom: 5px solid #ffdb9f;
        }

        .game-header {
            background: #ffecb3;
            padding: 20px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 4px solid #ffcf7a;
        }

        .score-board {
            background: #2f6b47;
            padding: 12px 30px;
            border-radius: 60px;
            color: #fff0bf;
            font-weight: bold;
            font-size: 1.9rem;
            box-shadow: inset 0 -2px 0 #1f4a30, 0 5px 12px rgba(0,0,0,0.08);
        }
        .score-board span { font-size: 2.4rem; color: #ffe082; margin-right: 8px; }

        .question-counter {
            background: #fff6e0;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.5rem;
            color: #c2801a;
            box-shadow: inset 0 0 0 2px white, 0 2px 8px rgba(0,0,0,0.08);
        }

        .game-main {
            padding: 40px 35px 45px;
            text-align: center;
        }

        .image-card {
            background: white;
            border-radius: 80px;
            padding: 30px 20px;
            margin-bottom: 30px;
            box-shadow: 0 18px 28px rgba(0, 0, 0, 0.08);
            border: 1px solid #ffe3bc;
        }

        /* 图片在平板上放大到 360px */
        .garbage-img {
            width: 360px;
            height: 360px;
            object-fit: contain;
            background: #fef7e8;
            border-radius: 70px;
            padding: 20px;
            transition: all 0.2s;
            filter: drop-shadow(10px 15px 18px rgba(0,0,0,0.12));
        }

        /* 垃圾名字稍微调大一点 (但相对图片还是显得小) */
        .question-name {
            font-size: 1.9rem;
            font-weight: 700;
            margin-top: 18px;
            color: #4a3a28;
            background: #fff0dd;
            display: inline-block;
            padding: 8px 32px;
            border-radius: 70px;
            letter-spacing: 2px;
        }

        .feedback {
            margin: 20px 0 18px;
            font-size: 1.5rem;
            font-weight: 600;
            min-height: 90px;
            padding: 15px 24px;
            background: #eff7ea;
            border-radius: 70px;
            color: #357a47;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: 0.2s;
            flex-wrap: wrap;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin: 30px 0 25px;
        }

        .cat-btn {
            flex: 1 1 180px;
            background: white;
            border: none;
            padding: 18px 12px;
            border-radius: 120px;
            font-weight: bold;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.12s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 6px 0 #bfb28b;
            font-family: inherit;
        }
        .cat-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #bfb28b; }
        .cat-btn img { width: 32px; height: 32px; pointer-events: none; }

        .cat-recyclable { background: #d4efff; color: #0077a3; border-bottom: 4px solid #4aa3d4; }
        .cat-kitchen { background: #e0f5cf; color: #417d2c; border-bottom: 4px solid #7fc45a; }
        .cat-harmful { background: #ffe2e2; color: #c24b4b; border-bottom: 4px solid #ed7a7a; }
        .cat-other { background: #f7ecdb; color: #a57c4c; border-bottom: 4px solid #dba768; }

        .reset-btn {
            background: #f3bc6d;
            border: none;
            margin-top: 15px;
            margin-bottom: 10px;
            padding: 14px 38px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
            color: #3b2f1e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .reset-btn:hover { background: #ffcf86; transform: scale(0.97);}

        .footer {
            padding: 16px 25px 28px;
            text-align: center;
            font-size: 1.1rem;
            color: #9b7e5a;
            background: #fffef7;
            letter-spacing: 1.5px;
            font-weight: normal;
            font-family: 'Segoe UI', monospace;
        }

        /* 平板竖屏或中等屏幕适配 */
        @media (max-width: 1200px) {
            .game-container { max-width: 1000px; }
            .garbage-img { width: 300px; height: 300px; }
            .cat-btn { flex: 1 1 150px; font-size: 1.1rem; padding: 14px 8px; }
            .feedback { font-size: 1.3rem; }
            .game-title { font-size: 2.8rem; }
        }

        @media (max-width: 900px) {
            .garbage-img { width: 250px; height: 250px; }
            .cat-btn { flex: 1 1 130px; font-size: 1rem; padding: 12px 6px; }
            .feedback { font-size: 1.1rem; }
            .game-title { font-size: 2.3rem; }
            .score-board { font-size: 1.5rem; }
            .question-counter { font-size: 1.2rem; }
            .question-name { font-size: 1.5rem; }
        }

        @media (max-width: 650px) {
            .cat-btn { flex: 1 1 110px; font-size: 0.8rem; padding: 10px 4px; }
            .garbage-img { width: 200px; height: 200px; }
            .score-board { font-size: 1.2rem; }
            .question-name { font-size: 1.2rem; }
            .feedback { font-size: 0.95rem; }
            .footer { font-size: 0.75rem; }
            .game-title { font-size: 2rem; padding: 14px 16px 10px; }
        }
        @media (max-width: 480px) {
            .garbage-img { width: 170px; height: 170px; }
        }
        .disabled-btn {
            pointer-events: none;
            opacity: 0.65;
            filter: grayscale(0.1);
            transform: none !important;
        }
        .modal-win {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-win.active {
            visibility: visible;
            opacity: 1;
        }
        .win-card {
            max-width: 550px;
            background: #fffef2;
            border-radius: 80px;
            padding: 45px 40px 55px;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            animation: bouncePop 0.4s ease-out;
        }
        @keyframes bouncePop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .win-card h2 { font-size: 3rem; color: #f5a623; margin-bottom: 18px; }
        .win-card p { font-size: 1.4rem; margin: 16px 0; }
        .win-card button {
            background: #56ab56;
            border: none;
            padding: 15px 42px;
            font-size: 1.4rem;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 18px;
            transition: 0.2s;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-title">🗑️ 垃圾分类小能手 ♻️</div>
    <div class="game-header">
        <div class="score-board">🏆 积分 <span id="scoreValue">0</span> / 5</div>
        <div class="question-counter">📋 第 <span id="currentQNumber">1</span> / 5 关</div>
    </div>
    <div class="game-main">
        <div class="image-card">
            <img id="garbageImage" class="garbage-img" src="" alt="生活垃圾">
            <div class="question-name" id="itemNameDisplay">加载中...</div>
        </div>
        <div class="feedback" id="feedbackMsg">
            🤖 AI 视觉识别已启动！点击下方分类桶，答对5种不同垃圾即可通关 🌟
        </div>
        <div class="categories" id="categoriesGroup">
            <button class="cat-btn cat-recyclable" data-type="recyclable">♻️ 可回收物</button>
            <button class="cat-btn cat-kitchen" data-type="kitchen">🍂 厨余垃圾</button>
            <button class="cat-btn cat-harmful" data-type="harmful">⚠️ 有害垃圾</button>
            <button class="cat-btn cat-other" data-type="other">🗑️ 其他垃圾</button>
        </div>
        <button id="resetGameBtn" class="reset-btn">🔄 重新挑战</button>
    </div>
    <div class="footer">
        🌍 环保小先锋
    </div>
</div>
<div id="winModal" class="modal-win">
    <div class="win-card">
        <h2>🎉 通关成功 🎉</h2>
        <p>🏅 科技节「垃圾分类小能手」勋章 🏅<br>⭐ 环保知识满分，赢得盖章 ⭐</p>
        <p>✔️ 正确分类5种垃圾，为地球减负！</p>
        <button id="closeWinBtn">✨ 再玩一次 ✨</button>
    </div>
</div>

<script>
    // ---------- 丰富题库 (每种分类至少三种垃圾，共12个不同物品) ----------
    const FULL_LIBRARY = [
        // 可回收物
        { id: 1, name: "塑料瓶", displayName: "🥤 塑料瓶", category: "recyclable", emoji: "🧴", fact: "塑料瓶回收后可制成新瓶子或衣服纤维" },
        { id: 2, name: "玻璃瓶", displayName: "🍾 玻璃瓶", category: "recyclable", emoji: "🥃", fact: "玻璃瓶可以无限循环再造" },
        { id: 3, name: "易拉罐", displayName: "🥫 易拉罐", category: "recyclable", emoji: "🥫", fact: "铝制易拉罐回收节能95%" },
        // 厨余垃圾
        { id: 4, name: "苹果核", displayName: "🍎 苹果核", category: "kitchen", emoji: "🍎", fact: "厨余垃圾可做成有机肥料" },
        { id: 5, name: "香蕉皮", displayName: "🍌 香蕉皮", category: "kitchen", emoji: "🍌", fact: "香蕉皮是很好的堆肥材料" },
        { id: 6, name: "剩菜剩饭", displayName: "🍚 剩菜剩饭", category: "kitchen", emoji: "🍲", fact: "厨余垃圾通过厌氧发酵能产生沼气" },
        // 有害垃圾
        { id: 7, name: "废旧电池", displayName: "🔋 废旧电池", category: "harmful", emoji: "🔋", fact: "一粒纽扣电池可污染60万升水" },
        { id: 8, name: "过期药品", displayName: "💊 过期药品", category: "harmful", emoji: "💊", fact: "过期药品不可随意丢弃，需特殊处理" },
        { id: 9, name: "废荧光灯管", displayName: "💡 废灯管", category: "harmful", emoji: "💡", fact: "灯管含汞，对环境和健康有害" },
        // 其他垃圾
        { id: 10, name: "纸巾", displayName: "🧻 纸巾", category: "other", emoji: "🧻", fact: "用过的纸巾不可回收，属于其他垃圾" },
        { id: 11, name: "一次性餐具", displayName: "🥢 一次性餐具", category: "other", emoji: "🥢", fact: "受污染的一次性餐具不可回收" },
        { id: 12, name: "脏污塑料袋", displayName: "🛍️ 脏塑料袋", category: "other", emoji: "🛍️", fact: "受污染塑料袋属于其他垃圾" }
    ];

    // 游戏状态 (无计时器)
    let currentRoundQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let gameActive = true;
    let waitingForNext = false;

    // DOM 元素
    const scoreSpan = document.getElementById('scoreValue');
    const currentQNumberSpan = document.getElementById('currentQNumber');
    const garbageImage = document.getElementById('garbageImage');
    const itemNameDisplay = document.getElementById('itemNameDisplay');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const categoryBtns = document.querySelectorAll('.cat-btn');
    const resetBtn = document.getElementById('resetGameBtn');
    const winModal = document.getElementById('winModal');
    const closeWinBtn = document.getElementById('closeWinBtn');

    // 辅助：随机抽取N个不同元素
    function getRandomQuestions(count) {
        if (count > FULL_LIBRARY.length) count = FULL_LIBRARY.length;
        const shuffled = [...FULL_LIBRARY];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    // 生成图片SVG（已彻底去掉“点击分类”的文字）
    function generateSvgForItem(item) {
        const bgColors = {
            recyclable: "#E8F5FB",
            kitchen: "#EEF9E6",
            harmful: "#FFEFEF",
            other: "#FEF6E8"
        };
        const bgColor = bgColors[item.category] || "#FFF7EA";
        const svgString = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
                <rect width="300" height="300" rx="70" fill="${bgColor}" stroke="#FFD89F" stroke-width="4"/>
                <circle cx="150" cy="140" r="70" fill="white" opacity="0.75"/>
                <text x="150" y="185" font-size="120" text-anchor="middle" dominant-baseline="middle" fill="#553D1E">${item.emoji}</text>
            </svg>
        `;
        return 'data:image/svg+xml,' + encodeURIComponent(svgString);
    }

    function updateScoreUI() {
        scoreSpan.innerText = score;
    }

    function updateQuestionNumberUI() {
        currentQNumberSpan.innerText = currentIndex + 1;
    }

    function winGame() {
        if (!gameActive) return;
        gameActive = false;
        enableButtons(false);
        winModal.classList.add('active');
    }

    function enableButtons(enable) {
        categoryBtns.forEach(btn => {
            if (enable) {
                btn.classList.remove('disabled-btn');
                btn.disabled = false;
            } else {
                btn.classList.add('disabled-btn');
                btn.disabled = true;
            }
        });
    }

    function loadCurrentQuestion() {
        if (!gameActive) return;
        if (currentIndex >= currentRoundQuestions.length) {
            if (score >= 5) winGame();
            return;
        }
        const q = currentRoundQuestions[currentIndex];
        itemNameDisplay.innerText = q.displayName;
        garbageImage.src = generateSvgForItem(q);
        updateQuestionNumberUI();
    }

    function getCategoryChinese(type) {
        const map = {
            recyclable: "可回收物 ♻️",
            kitchen: "厨余垃圾 🍂",
            harmful: "有害垃圾 ⚠️",
            other: "其他垃圾 🗑️"
        };
        return map[type] || "其他垃圾";
    }

    // 回答处理: 科普停留时间增加1秒（正确延迟1850ms / 错误2300ms）
    async function handleAnswer(selectedType) {
        if (!gameActive || waitingForNext) return;
        if (score >= 5) {
            winGame();
            return;
        }
        if (currentIndex >= currentRoundQuestions.length) return;

        const currentItem = currentRoundQuestions[currentIndex];
        const isCorrect = (selectedType === currentItem.category);

        // AI识别动效
        feedbackDiv.innerHTML = "🤖 AI 图像识别中... 🔍 分析垃圾特征";
        feedbackDiv.style.backgroundColor = "#f5e9d3";
        await new Promise(resolve => setTimeout(resolve, 200));

        if (isCorrect) {
            score++;
            updateScoreUI();
            const knowledge = currentItem.fact || "分类正确，保护环境！";
            feedbackDiv.innerHTML = `✅ 正确！ “${currentItem.displayName}” 属于 ${getCategoryChinese(currentItem.category)}。 ${knowledge} 🌟 +1分`;
            feedbackDiv.style.backgroundColor = "#d9f0cd";
            feedbackDiv.style.color = "#2a6b2f";

            if (score >= 5) {
                waitingForNext = true;
                enableButtons(false);
                setTimeout(() => {
                    if (gameActive) winGame();
                }, 1850);
                return;
            }

            waitingForNext = true;
            enableButtons(false);
            setTimeout(() => {
                currentIndex++;
                if (currentIndex < currentRoundQuestions.length && score < 5) {
                    loadCurrentQuestion();
                    waitingForNext = false;
                    enableButtons(true);
                    feedbackDiv.innerHTML = "🎯 下一件垃圾来啦！AI继续帮你识别，快分类吧！";
                    feedbackDiv.style.backgroundColor = "#eff7ea";
                    feedbackDiv.style.color = "#357a47";
                } else if (score >= 5) {
                    winGame();
                } else {
                    waitingForNext = false;
                    enableButtons(true);
                    feedbackDiv.innerHTML = "🎉 继续挑战吧！分类大师";
                }
            }, 1850);
        } else {
            const correctCatName = getCategoryChinese(currentItem.category);
            feedbackDiv.innerHTML = `❌ 分类错误！ “${currentItem.displayName}” 不属于 ${getCategoryChinese(selectedType)}。 它属于 ${correctCatName}。 📚 再试试，答对即可前进！`;
            feedbackDiv.style.backgroundColor = "#ffe8e8";
            feedbackDiv.style.color = "#bc5a3c";
            waitingForNext = true;
            enableButtons(false);
            setTimeout(() => {
                waitingForNext = false;
                enableButtons(true);
                feedbackDiv.innerHTML = "💪 别灰心！仔细观察垃圾种类，选对分类就能得分通关！";
                feedbackDiv.style.backgroundColor = "#eff7ea";
                feedbackDiv.style.color = "#357a47";
            }, 2300);
        }
    }

    function initGame() {
        currentRoundQuestions = getRandomQuestions(5);
        // 打乱顺序
        for (let i = currentRoundQuestions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentRoundQuestions[i], currentRoundQuestions[j]] = [currentRoundQuestions[j], currentRoundQuestions[i]];
        }
        currentIndex = 0;
        score = 0;
        gameActive = true;
        waitingForNext = false;

        updateScoreUI();
        updateQuestionNumberUI();
        enableButtons(true);
        loadCurrentQuestion();
        winModal.classList.remove('active');
        // 删除了“每类垃圾有丰富题库，”这几个字，保持简洁
        feedbackDiv.innerHTML = "🤖 AI 视觉识别已开启！答对5种不同物品即可通关~ 🌈";
        feedbackDiv.style.backgroundColor = "#eff7ea";
        feedbackDiv.style.color = "#357a47";
    }

    function bindEvents() {
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const catType = btn.getAttribute('data-type');
                handleAnswer(catType);
            });
        });
        resetBtn.addEventListener('click', () => {
            if (window._resetTimer) clearTimeout(window._resetTimer);
            initGame();
        });
        closeWinBtn.addEventListener('click', () => {
            winModal.classList.remove('active');
            initGame();
        });
    }

    bindEvents();
    initGame();
</script>
</body>
</html>
